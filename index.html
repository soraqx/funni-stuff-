<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 posa gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-light: #fff7ed;
            --bg-dark: #fce7f3;
            --primary: #be185d;
            --primary-light: #db2777;
            --primary-dark: #9d174d;
            --text-primary: #831843;
            --text-secondary: #be123c;
            --accent: #f43f5e;
            --input-border: #fbcfe8;
            --button-bg: #be185d;
            --button-hover: #9d174d;
            --button-inactive-bg: #fce7f3;
            --button-inactive-text: #831843;
            --empty-text: #f472b6;
            --gallery-bg: #fff7ed;
        }

        body.palette-gray {
            --bg-light: #f3f4f6;
            --bg-dark: #e5e7eb;
            --primary: #374151;
            --primary-light: #4b5563;
            --primary-dark: #1f2937;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --accent: #6b7280;
            --input-border: #d1d5db;
            --button-bg: #374151;
            --button-hover: #1f2937;
            --button-inactive-bg: #e5e7eb;
            --button-inactive-text: #374151;
            --empty-text: #9ca3af;
            --gallery-bg: #f9fafb;
        }

        body.palette-slate {
            --bg-light: #f1f5f9;
            --bg-dark: #e2e8f0;
            --primary: #334155;
            --primary-light: #475569;
            --primary-dark: #1e293b;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #64748b;
            --input-border: #cbd5e1;
            --button-bg: #334155;
            --button-hover: #1e293b;
            --button-inactive-bg: #e2e8f0;
            --button-inactive-text: #334155;
            --empty-text: #94a3b8;
            --gallery-bg: #f8fafc;
        }

        body.palette-zinc {
            --bg-light: #fafaf9;
            --bg-dark: #f4f4f3;
            --primary: #27272a;
            --primary-light: #3f3f46;
            --primary-dark: #18181b;
            --text-primary: #18181b;
            --text-secondary: #3f3f46;
            --accent: #52525b;
            --input-border: #e4e4e7;
            --button-bg: #27272a;
            --button-hover: #18181b;
            --button-inactive-bg: #f4f4f3;
            --button-inactive-text: #27272a;
            --empty-text: #a1a1aa;
            --gallery-bg: #fafaf9;
        }
    </style>
</head>

<body style="background: linear-gradient(to bottom right, var(--bg-light), var(--bg-dark));" class="min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="text-center mb-12 animate-in slide-in-from-top duration-500">
            <div class="flex justify-end mb-4">
                <div class="flex gap-2 flex-wrap">
                    <button id="palettePink" class="px-3 py-1 text-xs font-semibold rounded border-2 transition"
                        style="border-color: var(--primary); background-color: var(--button-bg); color: white;"
                        title="Pink Palette">🌸 Pink</button>
                    <button id="paletteGray"
                        class="px-3 py-1 text-xs font-semibold rounded border-2 border-gray-300 bg-gray-100 text-gray-700 transition hover:border-gray-400"
                        title="Gray Palette">⚪ Gray</button>
                    <button id="paletteSlate"
                        class="px-3 py-1 text-xs font-semibold rounded border-2 border-slate-300 bg-slate-100 text-slate-700 transition hover:border-slate-400"
                        title="Slate Palette">🩶 Slate</button>
                    <button id="paletteZinc"
                        class="px-3 py-1 text-xs font-semibold rounded border-2 border-zinc-300 bg-zinc-100 text-zinc-700 transition hover:border-zinc-400"
                        title="Zinc Palette">⛓️ Zinc</button>
                </div>
            </div>
            <h1 class="text-5xl md:text-4xl sm:text-3xl font-bold mb-2" style="color: var(--text-primary);">
                🐱 mga posaaaaa
            </h1>
            <p class="text-lg" style="color: var(--text-secondary);">
                organize photos by your adorable cats!
            </p>
        </header>

        <!-- Cat Management Section -->
        <div class="bg-white rounded-2xl shadow-lg p-8 md:p-6 mb-8 animate-in slide-in-from-top duration-500 delay-100">
            <h2 class="text-xl font-bold mb-4" style="color: var(--text-primary);">My Cats</h2>

            <!-- Add New Cat -->
            <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-6">
                <input type="text" id="newCatInput" placeholder="Enter cat name..."
                    class="flex-1 px-3 sm:px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 text-sm sm:text-base"
                    style="border-color: var(--input-border); --tw-ring-color: var(--primary);">
                <button id="addCatBtn"
                    class="px-4 sm:px-6 py-2 text-white rounded-lg font-semibold transition-colors text-sm sm:text-base whitespace-nowrap"
                    style="background-color: var(--button-bg);">
                    + Add Cat
                </button>
            </div>

            <!-- Cat List -->
            <div id="catList" class="flex flex-wrap gap-3"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 md:p-6 mb-12 animate-in zoom-in duration-500 delay-200">
            <label class="block mb-4 font-semibold text-lg" style="color: var(--text-secondary);">
                Upload Photos for <span id="currentCatDisplay" class="font-bold"
                    style="color: var(--text-primary);">Select a Cat</span>
            </label>
            <div class="relative">
                <input type="file" id="fileInput" accept="image/*" multiple class="sr-only">
                <label for="fileInput"
                    class="flex items-center justify-center gap-3 px-6 py-6 text-white rounded-lg cursor-pointer font-semibold transition-transform hover:scale-105 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
                    id="fileInputLabel" style="background-color: var(--button-bg);">
                    <span class="text-2xl">📸</span>
                    <span>Click to select images</span>
                </label>
            </div>
        </div>

        <div id="gallery"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-in fade-in duration-600 delay-400">
        </div>

        <div id="emptyState" class="text-center py-24" style="color: var(--empty-text);">
            <div class="text-6xl mb-6">🐱</div>
            <p class="text-xl" id="emptyStateText">Select or create a cat to get started!</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
        <div class="relative max-w-4xl max-h-[90vh] w-full">
            <button
                class="modal-close absolute top-4 right-4 bg-black/70 hover:bg-black/90 text-white w-12 h-12 rounded-full flex items-center justify-center text-3xl transition-colors">
                ×
            </button>
            <img id="modalImage" src="" alt="Full size cat photo" class="w-full h-auto rounded-lg">
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('emptyState');
        const emptyStateText = document.getElementById('emptyStateText');
        const catList = document.getElementById('catList');
        const newCatInput = document.getElementById('newCatInput');
        const addCatBtn = document.getElementById('addCatBtn');
        const currentCatDisplay = document.getElementById('currentCatDisplay');
        const fileInputLabel = document.getElementById('fileInputLabel');
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');
        const modalClose = document.querySelector('.modal-close');

        let currentCat = null;
        let cats = [];
        let currentImages = [];

        // API base path
        const API_BASE = '/.netlify/functions';

        // Get all cats from database
        async function loadCats() {
            try {
                const response = await fetch(`${API_BASE}/get-cats`);
                if (!response.ok) throw new Error('Failed to load cats');
                cats = await response.json();
                renderCatList();
                return cats;
            } catch (error) {
                console.error('Error loading cats:', error);
                alert('Failed to load cats');
                return [];
            }
        }

        // Set current cat
        function setCurrentCat(cat) {
            currentCat = cat;
            localStorage.setItem('currentCat', JSON.stringify(cat));
            currentCatDisplay.textContent = cat.name;
            fileInput.disabled = false;
            fileInputLabel.style.pointerEvents = 'auto';
            fileInputLabel.style.opacity = '1';
            loadGallery();
            renderCatList();
        }

        // Add new cat
        async function addCat() {
            const catName = newCatInput.value.trim();

            if (!catName) {
                alert('Please enter a cat name');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/add-cat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: catName }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert(error.error || 'Failed to add cat');
                    return;
                }

                const newCat = await response.json();
                newCatInput.value = '';
                await loadCats();

                if (!currentCat) {
                    setCurrentCat(newCat);
                }
            } catch (error) {
                console.error('Error adding cat:', error);
                alert('Failed to add cat');
            }
        }

        // Delete cat
        async function deleteCat(catId, catName) {
            if (!confirm(`Are you sure you want to delete ${catName} and all their photos?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/delete-cat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ catId }),
                });

                if (!response.ok) throw new Error('Failed to delete cat');

                if (currentCat && currentCat.id === catId) {
                    currentCat = null;
                    currentCatDisplay.textContent = 'Select a Cat';
                    fileInput.disabled = true;
                    fileInputLabel.style.opacity = '0.5';
                }

                await loadCats();
                loadGallery();
            } catch (error) {
                console.error('Error deleting cat:', error);
                alert('Failed to delete cat');
            }
        }

        // Render cat list
        function renderCatList() {
            catList.innerHTML = '';

            if (cats.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.textContent = 'No cats yet. Add one above!';
                emptyMsg.style.color = 'var(--text-secondary)';
                catList.appendChild(emptyMsg);
                return;
            }

            cats.forEach(cat => {
                const isActive = currentCat && cat.id === currentCat.id;
                const button = document.createElement('button');
                button.className = 'px-4 py-2 rounded-lg font-semibold transition-all';

                if (isActive) {
                    button.style.backgroundColor = 'var(--button-bg)';
                    button.style.color = 'white';
                    button.style.boxShadow = '0 4px 6px rgba(0, 0, 0, 0.1)';
                } else {
                    button.style.backgroundColor = 'var(--button-inactive-bg)';
                    button.style.color = 'var(--button-inactive-text)';
                }

                button.textContent = `${cat.name}`;
                button.onclick = () => setCurrentCat(cat);
                catList.appendChild(button);

                // Delete button
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'px-3 py-2 rounded-lg font-semibold transition-colors';
                deleteBtn.style.backgroundColor = 'var(--accent)';
                deleteBtn.style.color = 'white';
                deleteBtn.textContent = '✕';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteCat(cat.id, cat.name);
                };
                catList.appendChild(deleteBtn);
            });
        }

        // Load gallery for current cat
        async function loadGallery() {
            gallery.innerHTML = '';

            if (!currentCat) {
                emptyStateText.textContent = 'Select or create a cat to get started!';
                emptyState.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/get-images?catId=${currentCat.id}`);
                if (!response.ok) throw new Error('Failed to load images');

                currentImages = await response.json();

                if (currentImages.length === 0) {
                    emptyStateText.textContent = `No photos for ${currentCat.name} yet. Upload some to get started!`;
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');

                currentImages.forEach((image) => {
                    const item = document.createElement('div');
                    item.className = 'relative overflow-hidden rounded-2xl shadow-md hover:shadow-xl cursor-pointer group transition-transform hover:-translate-y-2';
                    item.style.backgroundColor = 'var(--gallery-bg)';

                    const img = document.createElement('img');
                    img.src = image.image_data;
                    img.alt = `${currentCat.name}'s photo`;
                    img.className = 'w-full h-56 object-cover display-block';

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'absolute top-3 right-3 text-white w-10 h-10 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-lg font-bold';
                    deleteBtn.style.backgroundColor = 'var(--accent)';
                    deleteBtn.innerHTML = '✕';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteImage(image.id);
                    };

                    item.appendChild(img);
                    item.appendChild(deleteBtn);

                    item.onclick = () => {
                        modalImage.src = image.image_data;
                        modal.classList.remove('hidden');
                    };

                    gallery.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading gallery:', error);
                emptyStateText.textContent = 'Failed to load photos';
                emptyState.classList.remove('hidden');
            }
        }

        // Upload images
        fileInput.addEventListener('change', async (e) => {
            if (!currentCat) {
                alert('Please select a cat first!');
                return;
            }

            const files = Array.from(e.target.files);

            for (const file of files) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const response = await fetch(`${API_BASE}/upload-image`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                catId: currentCat.id,
                                imageData: event.target.result,
                            }),
                        });

                        if (!response.ok) throw new Error('Failed to upload image');
                        await loadGallery();
                    } catch (error) {
                        console.error('Error uploading image:', error);
                        alert('Failed to upload image');
                    }
                };
                reader.readAsDataURL(file);
            }

            fileInput.value = '';
        });

        // Delete image
        async function deleteImage(imageId) {
            if (!confirm('Are you sure you want to delete this photo?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/delete-image`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageId }),
                });

                if (!response.ok) throw new Error('Failed to delete image');
                await loadGallery();
            } catch (error) {
                console.error('Error deleting image:', error);
                alert('Failed to delete image');
            }
        }

        // Modal controls
        modalClose.onclick = () => {
            modal.classList.add('hidden');
        };

        modal.onclick = (e) => {
            if (e.target === modal) {
                modal.classList.add('hidden');
            }
        };

        // Add cat button
        addCatBtn.onclick = addCat;
        newCatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addCat();
        });

        // Palette switching
        const palettes = ['pink', 'gray', 'slate', 'zinc'];

        function setPalette(paletteName) {
            document.body.className = paletteName === 'pink' ? '' : `palette-${paletteName}`;
            localStorage.setItem('selectedPalette', paletteName);
            updatePaletteButtons();
        }

        function updatePaletteButtons() {
            const currentPalette = localStorage.getItem('selectedPalette') || 'pink';
            palettes.forEach(palette => {
                const btn = document.getElementById(`palette${palette.charAt(0).toUpperCase() + palette.slice(1)}`);
                if (palette === currentPalette) {
                    btn.style.backgroundColor = 'var(--button-bg)';
                    btn.style.color = 'white';
                    btn.style.borderColor = 'var(--primary)';
                } else {
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }
            });
        }

        document.getElementById('palettePink').onclick = () => setPalette('pink');
        document.getElementById('paletteGray').onclick = () => setPalette('gray');
        document.getElementById('paletteSlate').onclick = () => setPalette('slate');
        document.getElementById('paletteZinc').onclick = () => setPalette('zinc');

        // Initialize
        async function init() {
            const savedPalette = localStorage.getItem('selectedPalette') || 'pink';
            setPalette(savedPalette);

            await loadCats();

            const savedCat = localStorage.getItem('currentCat');
            if (savedCat) {
                try {
                    const parsedCat = JSON.parse(savedCat);
                    const catExists = cats.find(c => c.id === parsedCat.id);
                    if (catExists) {
                        setCurrentCat(catExists);
                    } else {
                        renderCatList();
                        fileInput.disabled = true;
                        fileInputLabel.style.opacity = '0.5';
                    }
                } catch (e) {
                    renderCatList();
                    fileInput.disabled = true;
                    fileInputLabel.style.opacity = '0.5';
                }
            } else {
                renderCatList();
                fileInput.disabled = true;
                fileInputLabel.style.opacity = '0.5';
            }
        }

        init();
    </script>
</body>

</html>
