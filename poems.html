<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-light: #fff7ed;
            --bg-dark: #fce7f3;
            --primary: #be185d;
            --primary-light: #db2777;
            --primary-dark: #9d174d;
            --text-primary: #831843;
            --text-secondary: #be123c;
            --accent: #f43f5e;
            --input-border: #fbcfe8;
            --button-bg: #be185d;
            --button-hover: #9d174d;
            --button-inactive-bg: #fce7f3;
            --button-inactive-text: #831843;
            --gallery-bg: #fff7ed;
        }

        body.palette-gray {
            --bg-light: #f3f4f6;
            --bg-dark: #e5e7eb;
            --primary: #374151;
            --primary-light: #4b5563;
            --primary-dark: #1f2937;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --accent: #6b7280;
            --input-border: #d1d5db;
            --button-bg: #374151;
            --button-hover: #1f2937;
            --button-inactive-bg: #e5e7eb;
            --button-inactive-text: #374151;
            --gallery-bg: #f9fafb;
        }

        body.palette-slate {
            --bg-light: #f1f5f9;
            --bg-dark: #e2e8f0;
            --primary: #334155;
            --primary-light: #475569;
            --primary-dark: #1e293b;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #64748b;
            --input-border: #cbd5e1;
            --button-bg: #334155;
            --button-hover: #1e293b;
            --button-inactive-bg: #e2e8f0;
            --button-inactive-text: #334155;
            --gallery-bg: #f8fafc;
        }

        body.palette-zinc {
            --bg-light: #fafaf9;
            --bg-dark: #f4f4f3;
            --primary: #27272a;
            --primary-light: #3f3f46;
            --primary-dark: #18181b;
            --text-primary: #18181b;
            --text-secondary: #3f3f46;
            --accent: #52525b;
            --input-border: #e4e4e7;
            --button-bg: #27272a;
            --button-hover: #18181b;
            --button-inactive-bg: #f4f4f3;
            --button-inactive-text: #27272a;
            --gallery-bg: #fafaf9;
        }

        body {
            background: linear-gradient(to bottom right, var(--bg-light), var(--bg-dark));
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .poem-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--input-border);
            backdrop-filter: blur(4px);
        }

        .poem-title {
            color: var(--primary-dark);
            font-style: italic;
        }

        .poem-body {
            color: var(--text-primary);
            line-height: 2;
            white-space: pre-line;
        }

        .page-title {
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-secondary);
            opacity: 0.55;
        }

        a.back-link {
            color: var(--primary);
            opacity: 0.28;
            font-size: 0.65rem;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: opacity 0.3s;
        }

        a.back-link:hover {
            opacity: 0.6;
        }

        /* Compose section */
        .compose-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--input-border);
            backdrop-filter: blur(4px);
        }

        .compose-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--input-border);
            outline: none;
            width: 100%;
            color: var(--text-primary);
            font-family: Georgia, 'Times New Roman', serif;
            transition: border-color 0.2s;
        }

        .compose-input:focus {
            border-bottom-color: var(--primary);
        }

        .compose-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.35;
        }

        .compose-textarea {
            background: transparent;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            outline: none;
            width: 100%;
            resize: vertical;
            color: var(--text-primary);
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 2;
            transition: border-color 0.2s;
        }

        .compose-textarea:focus {
            border-color: var(--primary);
        }

        .compose-textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.35;
        }

        .btn-primary {
            background-color: var(--button-bg);
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--button-hover);
        }

        .btn-ghost {
            background-color: var(--button-inactive-bg);
            color: var(--button-inactive-text);
            border: 1px solid var(--input-border);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-ghost:hover {
            background-color: var(--input-border);
        }

        .section-label {
            color: var(--primary);
            opacity: 0.55;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            font-family: system-ui, sans-serif;
            text-transform: uppercase;
        }

        .delete-btn {
            color: var(--text-secondary);
            opacity: 0.3;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            transition: opacity 0.2s;
            font-family: system-ui, sans-serif;
        }

        .delete-btn:hover {
            opacity: 0.7;
        }

        .edit-btn {
            color: var(--primary);
            opacity: 0.35;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            transition: opacity 0.2s;
            font-family: system-ui, sans-serif;
        }

        .edit-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container mx-auto px-4 py-12 max-w-2xl">

        <header class="text-center mb-12">
            <h1 class="text-4xl font-light mb-2 page-title" style="letter-spacing: 0.08em;">poems</h1>
            <p class="text-sm page-subtitle">a quiet collection</p>
        </header>

        <!-- Compose section -->
        <div class="compose-card rounded-2xl p-8 shadow-sm mb-10">
            <div class="section-label mb-5">compose a poem</div>

            <div class="mb-4">
                <input id="compose-title" type="text" placeholder="title (optional)"
                    class="compose-input text-sm pb-1 mb-1" style="font-style:italic;" />
            </div>

            <div class="mb-5">
                <textarea id="compose-body" rows="6" placeholder="write your poem here..."
                    class="compose-textarea text-sm p-3"></textarea>
            </div>

            <div class="flex justify-end gap-2">
                <button id="clear-btn" class="btn-ghost text-xs px-4 py-2 rounded-lg font-semibold"
                    style="font-family:system-ui,sans-serif;">
                    clear
                </button>
                <button id="save-btn" class="btn-primary text-xs px-5 py-2 rounded-lg font-semibold"
                    style="font-family:system-ui,sans-serif;">
                    + add poem
                </button>
            </div>
        </div>

        <!-- Poems list -->
        <div id="poems-list" class="space-y-10"></div>

        <footer class="text-center mt-14">
            <a href="index.html" class="back-link">← back</a>
        </footer>
    </div>

    <script>
        // ── Palette ───────────────────────────────────────────────────────────────
        const savedPalette = localStorage.getItem('selectedPalette') || 'pink';
        if (savedPalette !== 'pink') document.body.classList.add('palette-' + savedPalette);

        // ── Default poems ─────────────────────────────────────────────────────────
        const DEFAULT_POEMS = [
            {
                id: 'default-1',
                title: 'morning cat',
                body: 'she stretches across the windowsill\nas if the sunlight owes her something—\nand maybe it does.\n\nshe has never learned\nto ask for less\nthan everything.'
            },
            {
                id: 'default-2',
                title: 'small hours',
                body: 'at 3am the house breathes differently,\nslower, softer,\nlike it finally has room\nto exhale.\n\ni sit with a cup of something warm\nand watch the dark\nand for once\nask nothing of it.'
            },
            {
                id: 'default-3',
                title: 'after rain',
                body: 'the petrichor is just a word\nfor something we already know—\nthat the earth, too,\nhas been waiting.'
            },
            {
                id: 'default-4',
                title: 'routine',
                body: 'she comes to the bowl at the same time\nevery morning,\ncertain only of this:\nthat it will be full,\nthat i will be there,\nthat some things do not change.\n\ni try to be\nas dependable as her hunger.'
            },
            {
                id: 'default-5',
                title: 'distance',
                body: 'the stars are old light,\narriving late,\npatient as grief—\nstill bright enough\nto navigate by.'
            }
        ];

        // ── Storage ───────────────────────────────────────────────────────────────
        function loadPoems() {
            const stored = localStorage.getItem('poems');
            if (stored) {
                try { return JSON.parse(stored); } catch (e) { }
            }
            // First visit: seed with defaults
            localStorage.setItem('poems', JSON.stringify(DEFAULT_POEMS));
            return DEFAULT_POEMS;
        }

        function savePoems(poems) {
            localStorage.setItem('poems', JSON.stringify(poems));
        }

        // ── Render ────────────────────────────────────────────────────────────────
        function renderPoems() {
            const poems = loadPoems();
            const list = document.getElementById('poems-list');
            list.innerHTML = '';

            if (poems.length === 0) {
                list.innerHTML = `<p style="color:var(--text-secondary);opacity:0.4;font-size:0.85rem;text-align:center;font-style:italic;">no poems yet. write one above.</p>`;
                return;
            }

            poems.forEach((poem, idx) => {
                const article = document.createElement('article');
                article.className = 'poem-card rounded-2xl p-8 shadow-sm';
                article.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <h2 class="poem-title text-lg">${escapeHtml(poem.title || 'untitled')}</h2>
                    <div class="flex gap-3">
                        <button class="edit-btn" data-idx="${idx}" title="edit">edit</button>
                        <button class="delete-btn" data-idx="${idx}" title="delete">✕</button>
                    </div>
                </div>
                <p class="poem-body text-sm">${escapeHtml(poem.body)}</p>
            `;
                list.appendChild(article);
            });

            // Delete handlers
            list.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    const poems = loadPoems();
                    poems.splice(idx, 1);
                    savePoems(poems);
                    renderPoems();
                });
            });

            // Edit handlers
            list.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    const poems = loadPoems();
                    const poem = poems[idx];
                    document.getElementById('compose-title').value = poem.title || '';
                    document.getElementById('compose-body').value = poem.body || '';
                    // Remove and re-save on submit
                    editingIdx = idx;
                    document.getElementById('save-btn').textContent = 'save changes';
                    document.getElementById('compose-title').focus();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&')
                .replace(/</g, '<')
                .replace(/>/g, '>')
                .replace(/"/g, '"');
        }

        // ── Compose ───────────────────────────────────────────────────────────────
        let editingIdx = null;

        document.getElementById('save-btn').addEventListener('click', () => {
            const title = document.getElementById('compose-title').value.trim();
            const body = document.getElementById('compose-body').value.trim();
            if (!body) return;

            const poems = loadPoems();
            const entry = {
                id: Date.now().toString(),
                title: title || 'untitled',
                body
            };

            if (editingIdx !== null) {
                poems[editingIdx] = entry;
                editingIdx = null;
                document.getElementById('save-btn').textContent = '+ add poem';
            } else {
                poems.unshift(entry);
            }

            savePoems(poems);
            document.getElementById('compose-title').value = '';
            document.getElementById('compose-body').value = '';
            renderPoems();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            document.getElementById('compose-title').value = '';
            document.getElementById('compose-body').value = '';
            editingIdx = null;
            document.getElementById('save-btn').textContent = '+ add poem';
        });

        // ── Init ──────────────────────────────────────────────────────────────────
        renderPoems();
    </script>
</body>

</html>
